
# Target namespace for PQC enforcement
# All CiliumEnvoyConfig resources will be created here
namespace: default

#  PQC / KEM settings 
pqc:
  enabled: true

  # Hybrid KEM: classical X25519 + post-quantum Kyber-768 (ML-KEM)
  # Falls back to X25519 only if peer doesn't support Kyber
  kemCurves:
    - x25519_kyber768

  # Lock to TLS 1.3 — required for PQC KEMs
  tls:
    minVersion: "TLSv1_3"
    maxVersion: "TLSv1_3"

  # Apply to outbound (client) connections
  outbound:
    enabled: true

  # Apply to inbound (server) connections
  inbound:
    enabled: true

#  Mesh-wide config (cluster-scoped) 
# Applies PQC to ALL namespaces via CiliumClusterwideEnvoyConfig
# Set to false to limit to `namespace` above only
clusterWide:
  enabled: false

#  Network Policy 
networkPolicy:
  # Deny traffic that doesn't go through the PQC-capable Envoy path
  enabled: true
  # Allow traffic from these namespaces (in addition to `namespace`)
  allowedNamespaces: []
  # - monitoring
  # - observability

#  Verification ConfigMap 
verify:
  # Creates a ConfigMap with a shell script to verify Kyber handshake
  enabled: true
