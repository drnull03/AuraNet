---
# 1. Frontend -> API Gateway
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: bootstrap-allow-frontend-ui-to-api-gateway
  namespace: default
  labels:
    app.kubernetes.io/managed-by: auranet-bootstrap
spec:
  endpointSelector:
    matchLabels:
      app: api-gateway
  ingress:
  - fromEndpoints:
    - matchLabels:
        app: frontend-ui
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
      rules:
        http: [{}]
    authentication:
      mode: required

---
# 2. API Gateway -> Account Service
apiVersion: cilium.io/v2
