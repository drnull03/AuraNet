# 1. API Gateway: Only accept traffic from the Frontend UI
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-ztna
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend-ui
    ports:
    - protocol: TCP
      port: 8080
---
# 2. Account Service: Only accept traffic from the API Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: account-service-ztna
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: account-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 5000
---
# 3. Loan Service: Only accept traffic from the API Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loan-service-ztna
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: loan-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 8081
---
# 4. Finance DB: Only accept traffic from Account and Loan services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: finance-db-ztna
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: finance-db
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: account-service
    - podSelector:
        matchLabels:
          app: loan-service
    ports:
    - protocol: TCP
      port: 5432
