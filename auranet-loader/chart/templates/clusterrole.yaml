---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "auranet-loader.fullname" . }}
  labels:
    {{- include "auranet-loader.labels" . | nindent 4 }}
rules:
  # auranet-loader runs as a DaemonSet and does not call the K8s API;
  # this role exists so future enrichment (pod → workload mapping) can be
  # added without changing the chart.
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "auranet-loader.fullname" . }}
  labels:
    {{- include "auranet-loader.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "auranet-loader.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "auranet-loader.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
