apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: auranet-runtime
  namespace: auranet-namespace
  labels:
    app: auranet-runtime
    component: forwarder
spec:
  selector:
    matchLabels:
      app: auranet-runtime
  template:
    metadata:
      labels:
        app: auranet-runtime
        component: forwarder
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet # Remember our DNS fix!
      containers:
      - name: forwarder
        image: "{{ .Values.runtime.image.repository }}:{{ .Values.runtime.image.tag }}"
        imagePullPolicy: {{ .Values.runtime.image.pullPolicy }}
        env:
        - name: LOG_PATH
          value: {{ .Values.runtime.logPath }}
        - name: NATS_URL
          value: {{ .Values.runtime.natsUrl }}
        - name: THREAT_MAP_PATH
          value: /etc/auranet/runtime/threat-map.json
        volumeMounts:
        - name: tetragon-logs
          mountPath: /var/run/cilium/tetragon
          readOnly: true
        - name: config-volume
          mountPath: /etc/auranet/runtime
          readOnly: true
      volumes:
      - name: tetragon-logs
        hostPath:
          path: /var/run/cilium/tetragon
          type: DirectoryOrCreate
      - name: config-volume
        configMap:
          name: auranet-runtime-config