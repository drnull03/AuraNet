apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: detect-nmap-scan
  namespace: default
spec:
  # Hook into the Linux execution syscall to catch network reconnaissance
  kprobes:
  - call: "sys_execve"
    syscall: true
    args:
    - index: 0
      type: "string"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "/usr/bin/nmap"
        - "/bin/nmap"
