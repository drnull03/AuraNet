apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: "block-ping-diaa"
  namespace: default
  annotations:
    description: "Blocks ping for unprivileged users (like diaa) but allows it for root"
spec:
  kprobes:
  - call: "sys_execve"
    syscall: true
    args:
    - index: 0
      type: "string" # The path to the binary being executed
    selectors:
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "/bin/ping"
        - "/usr/bin/ping"
      # This acts as our user filter!
      matchCapabilities:
      - type: Effective
        operator: NotIn
        values:
        - "CAP_SYS_ADMIN"
      matchActions:
      - action: Sigkill
