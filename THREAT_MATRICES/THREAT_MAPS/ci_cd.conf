# Network Tools (often used maliciously in pipelines)
nc=nc_execution
ncat=nc_execution
nmap=nmap_scan_detected
tcpdump=network_sniffing

# Container Escapes
nsenter=container_escape_attempt
unshare=container_escape_attempt
insmod=kernel_module_injection

# Secrets Theft
/etc/shadow=unauthorized_file_read
/root/.ssh/id_rsa=ssh_key_access
/root/.ssh/authorized_keys=ssh_key_access
