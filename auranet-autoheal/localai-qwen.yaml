apiVersion: apps/v1
kind: Deployment
metadata:
  name: localai-qwen-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localai
  template:
    metadata:
      labels:
        app: localai
    spec:
      # The init container ensures the model is present before LocalAI starts
      initContainers:
      - name: download-model
        image: curlimages/curl:latest
        command:
        - "sh"
        - "-c"
        - |
          MODEL_FILE="/models/qwen2.5-1.5b.gguf"
          if [ ! -f "$MODEL_FILE" ]; then
            echo "Downloading Qwen2.5-1.5B (Quantized Q4_K_M)..."
            curl -L -o "$MODEL_FILE" https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q4_k_m.gguf
          else
            echo "Model already downloaded. Skipping."
          fi
        volumeMounts:
        - name: models-volume
          mountPath: /models
      
      # The main LocalAI engine
      containers:
      - name: localai
        image: quay.io/go-skynet/local-ai:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: MODELS_PATH
          value: "/models"
        - name: THREADS # Adjust to match your CPU limit for optimal inference speed
          value: "2"
        resources:
          requests:
            cpu: "2"
            memory: "1.5Gi"
          limits:
            cpu: "4"
            memory: "3Gi"
        volumeMounts:
        - name: models-volume
          mountPath: /models
          
      volumes:
      - name: models-volume
        emptyDir: {} # Note: Swap this for a PersistentVolumeClaim (PVC) in production to avoid re-downloading on pod restarts

---
apiVersion: v1
kind: Service
metadata:
  name: localai-service
  namespace: default
spec:
  selector:
    app: localai
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
