# 1. Create a Cluster-Wide Role
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-clusterrole
rules:
  # Permission to cycle compromised pods across the cluster
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete", "deletecollection"] 
    
  # Permission to manage Cilium Policies across the cluster
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies", "tracingpolicies", "tracingpoliciesnamespaced"]
    verbs: ["get", "list", "create", "delete", "patch", "update"]

---
# 2. Bind the ClusterRole to the ServiceAccount in your namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-sa
    namespace: {{ .Values.namespace }} # Keeps the SA tied to auranet-namespace
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-clusterrole
  apiGroup: rbac.authorization.k8s.io