apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-sa
      containers:
      - name: autoheal
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: NATS_URL
          value: {{ .Values.nats.url | quote }}
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        
        volumeMounts:
        - name: threat-matrix-volume
          mountPath: /etc/auranet/config/
          readOnly: true
          
      volumes:
      - name: threat-matrix-volume
        configMap:
          name: {{ .Release.Name }}-{{ .Chart.Name }}-threat-matrix
          items:
            - key: threat_matrix.conf
              path: threat_matrix.conf
