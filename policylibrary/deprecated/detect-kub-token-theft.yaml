apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: detect-token-theft
  namespace: default
spec:
  # Hook into the LSM to catch unauthorized reads of the pod's service account token
  kprobes:
  - call: "security_file_open"
    syscall: false
    args:
    - index: 0
      type: "file"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "/run/secrets/kubernetes.io/serviceaccount/token"
