apiVersion: apps/v1
kind: Deployment
metadata:
  name: auranet-ui
  namespace: auranet-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auranet-ui
  template:
    metadata:
      labels:
        app: auranet-ui
    spec:
      containers:
        - name: auranet-ui
          image: auranet/ui:latest # Build your Dockerfile and push to local registry
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: CONFIG_PATH
              value: "/app/config/naive.conf"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
      volumes:
        - name: config-volume
          configMap:
            name: auranet-topology-config
---
apiVersion: v1
kind: Service
metadata:
  name: auranet-ui-service
  namespace: auranet-namespace
spec:
  type: NodePort
  selector:
    app: auranet-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30000 # Access via http://localhost:30000 without port-forwarding
