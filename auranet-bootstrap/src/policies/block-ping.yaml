apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: auranet-block-ping
  namespace: default
spec:
  kprobes:
  - call: "sys_execve"
    syscall: true
    args:
    - index: 0
      type: "string"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "/bin/ping"
        - "/usr/bin/ping"
      matchActions:
      - action: Sigkill