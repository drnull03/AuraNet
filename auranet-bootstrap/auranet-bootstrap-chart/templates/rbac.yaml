apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "auranet-bootstrap.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "auranet-bootstrap.fullname" . }}-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: ["cilium.io"]
  resources: ["ciliumnetworkpolicies"]
  verbs: ["create", "get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "auranet-bootstrap.fullname" . }}-rolebinding
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "auranet-bootstrap.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "auranet-bootstrap.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io