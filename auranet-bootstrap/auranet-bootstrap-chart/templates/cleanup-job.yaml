apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "auranet-bootstrap.fullname" . }}-cleanup-sa
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    # Removed hook-succeeded so it doesn't instantly delete itself
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "auranet-bootstrap.fullname" . }}-cleanup-role
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
- apiGroups: ["cilium.io"]
  resources: ["ciliumnetworkpolicies"]
  verbs: ["list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "auranet-bootstrap.fullname" . }}-cleanup-rb
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": before-hook-creation
subjects:
- kind: ServiceAccount
  name: {{ include "auranet-bootstrap.fullname" . }}-cleanup-sa
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "auranet-bootstrap.fullname" . }}-cleanup-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "auranet-bootstrap.fullname" . }}-cleanup-job
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    # The Job can keep hook-succeeded because it actually has a lifecycle
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: {{ include "auranet-bootstrap.fullname" . }}-cleanup-sa
      restartPolicy: Never
      containers:
      - name: cleanup
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["node", "/app/cleanup.js"]