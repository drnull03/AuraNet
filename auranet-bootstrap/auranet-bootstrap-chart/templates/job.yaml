apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "auranet-bootstrap.fullname" . }}-job
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      serviceAccountName: {{ include "auranet-bootstrap.fullname" . }}-sa
      restartPolicy: Never
      containers:
      - name: bootstrap
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args: ["/etc/auranet/naive.conf"]
        volumeMounts:
        - name: config-volume
          mountPath: /etc/auranet
      volumes:
      - name: config-volume
        configMap:
          name: {{ include "auranet-bootstrap.fullname" . }}-config