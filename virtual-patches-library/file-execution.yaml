apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: auranet-block-script-execution
  namespace: default
spec:
  endpointSelector:
    matchLabels:
      role: frontend-web
  ingress:
  - toPorts:
    - ports:
      - port: "80"
        protocol: TCP
      rules:
        http:
        - method: "GET"
          path: ".*/uploads/.*(?i)(\\.php|\\.jsp|\\.sh|\\.py)$"
