# chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
    component: security-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      containers:
      - name: ztc
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: NATS_URL
          value: {{ .Values.env.natsUrl }}
          
        volumeMounts:
        - name: threat-matrix-volume
          mountPath: /etc/auranet/config/
          readOnly: true
          
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
            
      volumes:
      - name: threat-matrix-volume
        configMap:
          name: {{ .Release.Name }}-{{ .Chart.Name }}-threat-matrix
          items:
            - key: threat_matrix.conf
              path: threat_matrix.conf
